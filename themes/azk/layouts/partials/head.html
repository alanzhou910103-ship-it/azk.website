<meta charset="utf-8">
<title>{{ if .Title }}{{ .Title }} — {{ site.Title }}{{ else }}{{ site.Title }}{{ end }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO Meta -->
<meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ site.Params.metadata.description }}{{ end }}">
<meta name="keywords" content="{{ delimit site.Params.metadata.keywords ", " }}">
<meta name="author" content="{{ site.Params.metadata.author }}">
{{ with .Permalink }}<link rel="canonical" href="{{ . }}">{{ end }}

<!-- Open Graph -->
<meta property="og:title" content="{{ if .Title }}{{ .Title }} — {{ site.Title }}{{ else }}{{ site.Title }}{{ end }}">
<meta property="og:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ site.Params.metadata.description }}{{ end }}">
<meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:image" content="{{ site.Params.metadata.image | absURL }}">
<meta property="og:site_name" content="{{ site.Title }}">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ if .Title }}{{ .Title }} — {{ site.Title }}{{ else }}{{ site.Title }}{{ end }}">
<meta name="twitter:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ site.Params.metadata.description }}{{ end }}">
<meta name="twitter:image" content="{{ site.Params.metadata.image | absURL }}">

<!-- Site Verification -->
{{ with site.Params.site_verification.google }}<meta name="google-site-verification" content="{{ . }}">{{ end }}
{{ with site.Params.site_verification.bing }}<meta name="msvalidate.01" content="{{ . }}">{{ end }}

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- Custom CSS -->
{{ $style := resources.Get "css/style.css" | resources.Minify | resources.Fingerprint }}
<link rel="stylesheet" href="{{ $style.RelPermalink }}">

<!-- AOS Animation -->
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<!-- Structured Data: Organization -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "int-rock",
  "url": "https://int-rock.com",
  "logo": "{{ site.Params.metadata.image | absURL }}",
  "description": "{{ site.Params.metadata.description }}",
  "email": "sales@int-rock.com",
  "sameAs": [
    "https://www.linkedin.com/in/alan-zhou-42b224415",
    "https://x.com/Alangaming91"
  ]
}
</script>
